{% extends "base.html" %}
{% block title %}{{ title }} | GIA{% endblock %}
{% block content %}
<section class="panel panel--error">
    <h1>{{ title }}</h1>
    <p>{{ message }}</p>
    <a class="primary-btn" href="{{ url_for('dashboard') if current_user.is_authenticated else url_for('login') }}">Ir al inicio</a>
</section>
{% endblock %}
